<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex01</title>
</head>
<body>
    <h1>Pare, pense e siga</h1>

    <button onclick="pare()">Pare</button>

    <br>
    
    <button onclick="pense()">Pense</button>

    <br>

    <button onclick="siga()">Siga</button>

    <br>

    <div id="resultado">

    </div>
</body>
<script>
    function pare(){
        resultado.innerHTML = "Pare e aguarde!"
    }

    function pense(){
        resultado.innerHTML = "Pense se pode seguir ou se deve parar!"
    }

    function siga(){
        resultado.innerHTML = "Pode seguir adiante!"
    }
</script>
</html>
