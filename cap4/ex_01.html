<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex01</title>
</head>
<body>
    <h1>Exercício 01</h1>

    <input type="text" placeholder="Insira o nome de uma pessoa a quem você ama:" id="ipt_usuario_amor">

    <br>

    <input type="text" placeholder="Digite o número correspondente do tamanho do amor:" id="ipt_tamanho_amor">

    <button onclick="expressarAmor()">Expressar amor</button>

    <br>

    <div id="resultado"></div>
</body>
<script>
    function expressarAmor(){
        let nomePessoaAmor = ipt_usuario_amor.value
        let numeroAmor = Number(ipt_tamanho_amor.value)
        let mensagem = ``

        for (let i = 0; i < numeroAmor; i++){
           mensagem += `${i} - ${nomePessoaAmor}, eu te amo! Sempre lembre disso!<br>`
        }
        resultado.innerHTML = mensagem
    }
</script>
</html>
