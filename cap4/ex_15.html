<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex15</title>
</head>
<body>
    <h1>Exercício 15</h1>

    De quantos em quantos dias você faz musculação?
    <br>
    <input type="text" placeholder="Ex: 1" id="ipt_usuario_dias">
    
    <br>

    <button onclick="exbirRotina()">Exibir rotina mensal</button>    

    <br>

    <div id="resultado"></div>
</body>
<script>
    function exbirRotina(){
        let diasUsuario = Number(ipt_usuario_dias.value)
        let contador = 0
        let mensagem = ``

        for (let i = 1; i <= 30; i++){
            if (contador == 0){
                mensagem += `Dia ${i} - Musculação <br>`
                contador = diasUsuario - 1
            } else if (contador > 0){
                contador--
                mensagem += `Dia ${i} - Comer, dormir etc <br>`
            }
        }
        resultado.innerHTML = mensagem
    }
</script>
</html>
