<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex08b</title>
</head>
<body>
    <h1>Exercício 08b</h1>

    <input type="text" placeholder="Insira a nota do ENEM:" id="ipt_nota_enem">

    <br>

    <input type="text" placeholder="Insira a nota do seu vestibular interno:" id="ipt_nota_vestibular">

    <br>

    <button onclick="avaliar()">Avaliação</button>
</body>
<script>
    function avaliar() {
        let notaEnem = Number(ipt_nota_enem.value)
        let notaVestibular = Number(ipt_nota_vestibular.value)

        if (notaEnem >= 800 || notaVestibular >= 700) {
            alert("Parabéns! Aprovado")
        } else {
            alert("Tente semestre que vem!")
        }
    }
</script>
</html>
