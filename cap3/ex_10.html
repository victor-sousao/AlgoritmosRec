<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex10</title>
</head>
<body>
    <h1>Exercício 10</h1>

    <label>Digite a forma de pagamento</label>
    <input type="text" placeholder="Ex: Débito, Crédito, Dinheiro ou Boleto" id="ipt_metodo_pagamento">

    <br>

    <button onclick="analisarCompra()">Analisar compra</button>

    <br>

    <div id="resultado"></div>
</body>
<script>
    function analisarCompra(){
        let metodoPagamento = ipt_metodo_pagamento.value.toLowerCase()

        if (metodoPagamento == "dinheiro" || metodoPagamento == "débito"){
            resultado.innerHTML =  "Você terá que pagar a vista"
        } else {
            resultado.innerHTML =  "Pagamento poderá ser parcelado"
        }
    }
</script>
</html>
