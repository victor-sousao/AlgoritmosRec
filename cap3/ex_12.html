<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex12</title>
</head>
<body>
    <h1>Exercício 12</h1>

    <input type="text" placeholder="Insira o tamanho da tela do celular encontrado:" id="ipt_tamanho_tela">
    
    <br>

    <input type="text" placeholder="Insira a cor do celular encontrado:" id="ipt_cor_celular">

    <br>

    <button onclick="verificarGosto()">Será que ele gosta?</button>
    
    <br>

    <div id="resultado"></div>
</body>
<script>
    function verificarGosto() {
        let tamanhoTela = Number(ipt_tamanho_tela.value)
        let corCelular = ipt_cor_celular.value.toLowerCase()

        if (tamanhoTela >= 6.5 && (corCelular == "preto" || corCelular == "prata" || corCelular == "azul" || corCelular == "vermelho")){
            resultado.innerHTML = `<img src="https://s2.glbimg.com/jsaPuF7nO23vRxQkuJ_V3WgouKA=/e.glbimg.com/og/ed/f/original/2014/06/10/461777879.jpg">`
        } else {
            resultado.innerHTML = `<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBTQvRrJ3iZvq8-JJusFxBiN30sVZkp5nNMEynnJTQYt-cfZ6adrHmV8T4&s=10">`   
        }
    } 
</script>
</html>
