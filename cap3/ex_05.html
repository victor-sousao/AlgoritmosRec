<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex05</title>
</head>
<body>
    <h1>Exercício 05</h1>

    <input type="text" placeholder="Insira sua nota por favor:" id="ipt_nota_aluno">

    <br>

    <button onclick="avaliarAluno()">Avaliar aluno</button>

</body>
<script>
    function avaliarAluno() {
        let notaAluno = Number(ipt_nota_aluno.value)

        if (notaAluno < 6 ){
            alert("Aluno não aprovado!")
        } else if (notaAluno >= 6 && notaAluno <= 8.5) {
            alert("Aluno comum e aprovado!")
        } else if (notaAluno > 8.5 && notaAluno <= 10) {
            alert("Aluno Exemplar!")
        } else {
            alert("Nota inválida!") // Esse else foi apenas uma coisa a mais que eu adicionei por capricho.
        }
    }
</script>
</html>
