<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex09</title>
</head>
<body>
    <h1>Exercício 09</h1>

    <input type="text" placeholder="Insira o valor da sua renda individual:" id="ipt_renda_individual">
    
    <br>

    <input type="text" placeholder="Insira o valor da sua renda familiar:" id="ipt_renda_familiar">
    
    <br>

    <button onclick="verificarBeneficio()">Terei o benefício</button>
</body>
<script>
    function verificarBeneficio() {
        let rendaIndividual = Number(ipt_renda_individual.value)
        let rendaFamiliar = Number(ipt_renda_familiar.value)

        if (rendaIndividual <= 2000 || rendaFamiliar <= 3000) {
            alert("Você terá direito ao auxílio!")
        } else {
            alert("Sem direito ao auxílio")
        }
    }
</script>
</html>
