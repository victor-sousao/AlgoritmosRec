<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex07</title>
</head>
<body>
    <h1>Exercício 07</h1>

    Insira o nome do filme abaixo:
    <br>
    <input type="text" placeholder="Nome do filme:" id="ipt_nome_filme">

    <br>

    <button onclick="cadastrarFilme()">Cadastrar</button>

    <br>

    <div id="resultado"></div>

    <span style="color: blue;"></span>

</body>
<script>
    var filmes = []
    let contador = 0

    function cadastrarFilme(){
        let nomeFilme = ipt_nome_filme.value

        filmes.push(nomeFilme)
        console.log(filmes)

        if (contador == 0){
            resultado.innerHTML += `<span style="color: blue;">${filmes[filmes.length - 1]}<br></span>`
            contador = 1       
        } else if (contador == 1){
            resultado.innerHTML += `<span style="color: red;">${filmes[filmes.length - 1]}<br></span>`
            contador = 0
        }
    }
</script>
</html>
