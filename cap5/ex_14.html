<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex14</title>
</head>

<body>
    <h1>Exercício 14</h1>

    Insira um valor qualquer:
    <br>
    <input type="text" placeholder="Insira o número:" id="ipt_numero">

    <br>

    <button onclick="analisarHistorico()">Analisar histórico</button>

    <br>

    <div id="resultado"></div>
</body>
<script>
    let numeros = []

    function analisarHistorico() {
        let numero = Number(ipt_numero.value)
        let mensagem = ``
        numeros.push(numero)
        console.log(numeros)

        let maiorNumero = numeros[0]
        let menorNumero = numeros[0]


        for (let i = 0; i < numeros.length; i++) {
            mensagem += `${i + 1}º Número: ${numeros[i]}<br><br>`
            if (numeros[i] > maiorNumero){
                maiorNumero = numeros[i]
            } else if (numeros[i] < menorNumero){
                menorNumero = numeros[i]
            }
        }
        mensagem += `<br><br>Maior:${maiorNumero}<br>Menor:${menorNumero}`
        resultado.innerHTML = mensagem
    }
</script>
</html>
