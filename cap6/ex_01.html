<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex01</title>
</head>
<body>
    <h1>Exercício 01</h1>

    <button onclick="verAvaliacao()">Avaliar</button>

    <br>
    <img src="" height="100px">
    <div id="resultado"></div>
</body>
<script>
    function verAvaliacao(){
        let max = 5
        let min = 0
        let numeroAleatorio = Math.random() * (max - min) + min

        resultado.innerHTML = `Nota recebida: ${numeroAleatorio.toFixed(1)}<br><br>`

        if (numeroAleatorio <= 0.5){
            resultado.innerHTML += `<img src="https://cdn.shopify.com/s/files/1/1061/1924/files/Sad_Face_Emoji_Icon_60x60.png" height="100px">`
        } else if (numeroAleatorio <= 1.5){
            resultado.innerHTML += `<img src="https://cdn.shopify.com/s/files/1/1061/1924/files/Confused_Face_Emoji_60x60.png" height="100px">`
        } else if (numeroAleatorio <= 3.5){
            resultado.innerHTML += `<img src="https://cdn.shopify.com/s/files/1/1061/1924/files/Unamused_Face_Emoji_Icon_60x60.png" height="100px">`
        } else if (numeroAleatorio <= 4.5){
            resultado.innerHTML += `<img src="https://cdn.shopify.com/s/files/1/1061/1924/files/Slightly_Smiling_Face_Emoji_Icon_60x60.png" height="100px">`
        } else if (numeroAleatorio > 4.5){
            resultado.innerHTML += `<img src="https://cdn.shopify.com/s/files/1/1061/1924/files/Smiling_Emoji_with_Eyes_Opened_Icon_60x60.png" height="100px">`
        } 
    }
</script>
</html>
