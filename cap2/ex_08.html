<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex08</title>
</head>
<body>
    <h1>Você gosta dessa série?</h1>

    <input type="text" placeholder="Digite o nome da última série assistida" id="ipt_ultima_serie">
    <br>
    <input type="text" placeholder="Digite a quantidade total de episódios assistidos:" id="ipt_qtd_episodios">

    <br>
    <button onclick="verificarNivel()">Verificar</button>

    <br>
    <div id="resultado"></div>
</body>
<script>
    function verificarNivel(){
        let serieAssistida = ipt_ultima_serie.value
        let qtdEpisodios = Number(ipt_qtd_episodios.value)
        let qtdHoras = (qtdEpisodios * 22) * 60

        resultado.innerHTML = `Vejo que você gosta da série ${serieAssistida}`

        if (qtdHoras > 30){
            resultado.innerHTML += `<br>Uau, você realmente gosta dessa série!`
        }

    }
</script>

</html>
