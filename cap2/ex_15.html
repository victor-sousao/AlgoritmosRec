<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex15</title>
</head>
<body>
    <h1>Exercício 15</h1>

    <input type="text" placeholder="Informe a sua temperatura:" id="ipt_temperatura">

    <br>

    <button onclick="verificarTemperatura()">Verificar temperatura</button>

    <br>

    <div id="resultado"></div>
</body>
<script>
    function verificarTemperatura(){
        let temperatura = Number(ipt_temperatura.value)

        if (temperatura < 14){
            resultado.innerHTML = "Congelante "
        } else if (temperatura < 21){
            resultado.innerHTML = "Com Frio"
        } else if (temperatura < 24){
            resultado.innerHTML = "Confortável"
        } else if (temperatura < 31){
            resultado.innerHTML = "Com Calor"
        } else {
            resultado.innerHTML = "Calor escaldante"
        }
    }
</script>
</html>
