<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex17</title>
</head>
<body>
    <h1>Exercício 17</h1>
    
    <input type="text" placeholder="Informe a sua nota:" id="ipt_nota">

    <br>

    <button onclick="classificarAluno()">Classificar aluno</button>

    <br>

    <div id="resultado"></div>
</body>
<script>
    function classificarAluno(){
        let nota = Number(ipt_nota.value)

        if (nota < 5){
            resultado.innerHTML = "Aluno precisa de muita ajuda"}
        else if (nota < 7){
            resultado.innerHTML = "Aluno na média"}
        else if (nota <= 9.5){
            resultado.innerHTML = "Aluno acima da média"
        } else {
            resultado.innerHTML = "Aluno fora da curva"
        }
    }
</script>
</html>
