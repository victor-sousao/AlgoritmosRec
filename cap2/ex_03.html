<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex03</title>
</head>
<body>
    <h1>Média das notas</h1>

    <input type="text" placeholder="Insira o valor de uma nota:" id="ipt_nota1">
    <br>
    <input type="text" placeholder="Insira o valor de outra nota:" id="ipt_nota2">
    <br>
    <input type="text" placeholder="Insira o valor de outra nota:" id="ipt_nota3">
    <br>

    <button onclick="analisarDesempenho()">Analisar desempenho</button>

    <div id="resultado"></div>
</body>
<script>
    function analisarDesempenho(){
        let notaUm = Number(ipt_nota1.value)
        let notaDois = Number(ipt_nota2.value)
        let notaTres = Number(ipt_nota3.value)

        let calcularMedia = (notaUm + notaDois + notaTres) / 3

        resultado.innerHTML = `Sua média foi de ${calcularMedia}`

        if (calcularMedia > 9.4){
            resultado.innerHTML += `<br>Parabéns, você é fora de série!`
        }
    }
</script>
</html>
