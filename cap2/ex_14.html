<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex14</title>
</head>
<body>
    <h1>Exercício 14</h1>

    <input type="text" placeholder="Informe a sua renda familiar:" id="ipt_renda_familiar">

    <br>

    <button onclick="analisarRenda()">Analisar Renda</button>

    <br>
    
    <div id="resultado"></div>
</body>
<script>
    function analisarRenda(){
        let rendaFamiliar = Number(ipt_renda_familiar.value)

        if (rendaFamiliar <= 250){
            resultado.innerHTML = "Classe E"
        } else if (rendaFamiliar <= 900){
            resultado.innerHTML = "Classe D"
        } else if (rendaFamiliar <= 2500){
            resultado.innerHTML = "Classe C"
        } else if (rendaFamiliar <= 9500){
            resultado.innerHTML = "Classe B"
        } else {
            resultado.innerHTML = "Classe A"
        }
    }
</script>
</html>
