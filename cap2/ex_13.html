<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex13</title>
</head>
<body>
    <h1>Exercício 13</h1>

    <input type="text" placeholder="Insira sua altura:" id="ipt_altura">

    <br>

    <button onclick="analisarEstatura()">Analisar Estatura</button>

    <br>

    <div id="resultado"></div>
</body>
<script>
    function analisarEstatura(){
        let alturaUsuario = Number(ipt_altura.value)

        if (alturaUsuario <= 1.65){
            resultado.innerHTML = "Você pode ser piloto de corrida" 
        } else if (alturaUsuario <= 1.80){
            resultado.innerHTML = "Você pode ser jogador de futebol"
        } else if (alturaUsuario > 1.80){
            resultado.innerHTML = "Você pode ser jogador de vôlei ou basquete"
        }
    }
</script>
</html>
